<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Protocols</title>
    <style>
        /* Modern Dark/Sleek Base */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            padding: 40px 20px; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* Clean, vibrant header */
        h1 { 
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ff595e, #ffca3a, #8ac926, #1982c4, #6a4c93);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0;
        }

        /* Rainbow Card Container */
        li { 
            position: relative;
            margin-bottom: 16px; 
            border-radius: 12px; 
            background: #161b22;
            padding: 1px; /* Creates the space for the gradient border to show through */
            background-image: linear-gradient(45deg, #ff595e, #ffca3a, #8ac926, #1982c4, #6a4c93);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Inner card content wrapper */
        .card-inner {
            background: #161b22;
            border-radius: 11px;
            padding: 16px;
            display: flex;
            align-items: center;
        }

        /* Smooth hover/pop effect */
        li:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(25, 130, 196, 0.4);
        }

        /* Protocol Links styling */
        a { 
            color: #f0f6fc; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 1.15rem; 
            text-transform: capitalize; 
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Tiny indicator arrow on the right */
        a::after {
            content: "→";
            font-size: 1.2rem;
            color: #58a6ff;
            transition: transform 0.2s ease;
        }

        li:hover a::after {
            transform: translateX(4px);
        }

        /* Status messages */
        .status {
            text-align: center;
            color: #8b949e;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Protocol Directory</h1>
        <ul id="file-list"><li class="status">Loading available files...</li></ul>
    </div>

    <script>
        const GITHUB_USER = 'peptide-info';
        const GITHUB_REPO = 'vials';
        const FOLDER_PATH = 'peptides'; 

        async function loadFiles() {
            const listElement = document.getElementById('file-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`);
                if (!response.ok) throw new Error('Failed to fetch folder contents');
                
                const data = await response.json();
                let htmlString = '';

                const validFiles = data.filter(item => 
                    item.type === 'file' && 
                    item.name.endsWith('.html') && 
                    item.name !== 'index.html'
                );

                if (validFiles.length === 0) {
                    listElement.innerHTML = '<li class="status">No HTML protocols found in the folder.</li>';
                    return;
                }

                validFiles.forEach(file => {
                    // Clean up display text formatting
                    const displayName = file.name.replace('.html', '').replace('-', ' ');
                    
                    // Build cards wrapped with the inner container for the gradient effect
                    htmlString += `
                        <li>
                            <div class="card-inner">
                                <a href="${FOLDER_PATH}/${file.name}">${displayName}</a>
                            </div>
                        </li>`;
                });

                listElement.innerHTML = htmlString;
            } catch (error) {
                listElement.innerHTML = `<li class="status" style="color:#ff7b72;">Error: ${error.message}</li>`;
            }
        }

        loadFiles();
    </script>
</body>
</html>
