<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Protocols</title>
    <style>
        /* Modern Minimalist Dark Design */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 60px 20px; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 540px;
        }

        /* Subtle Sleek Header */
        h1 { 
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #ff9aa2, #ffb7b2, #ffdac1, #e2f0cb, #b5ead7, #c7ceea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.75px;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0;
        }

        /* Micro-Gradient Border Wrapper */
        li { 
            position: relative;
            margin-bottom: 14px; 
            border-radius: 14px; 
            background: #161b22;
            padding: 1px; 
            background-image: linear-gradient(135deg, rgba(255,154,162,0.3) 0%, rgba(199,206,234,0.3) 100%);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-image 0.2s ease, box-shadow 0.2s ease;
        }

        /* Card Inner Content Box */
        .card-inner {
            background: #161b22;
            border-radius: 13px;
            display: flex;
            align-items: center;
        }

        /* Hover Interaction Layers */
        li:hover {
            transform: translateY(-2px);
            background-image: linear-gradient(135deg, #ff9aa2 0%, #c7ceea 100%);
            box-shadow: 0 8px 30px rgba(199, 206, 234, 0.15);
        }

        /* THE HITBOX FIX: Anchor stretches to fill 100% of the container box area */
        .protocol-link { 
            color: #f0f6fc; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 1.1rem; 
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            letter-spacing: -0.2px;
            padding: 18px 20px; 
            border-radius: 13px;
        }

        /* Align badge and text inline inside the link hook setup */
        .link-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Dynamic Indicator Badges */
        .badge-icon {
            font-size: 1.3rem;
            background: rgba(255, 255, 255, 0.05);
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        /* Clean Functional Indicator Arrow */
        .protocol-link::after {
            content: "→";
            font-size: 1.2rem;
            color: #8b949e;
            transition: transform 0.2s ease, color 0.2s ease;
            padding-left: 10px;
        }

        li:hover .protocol-link::after {
            transform: translateX(3px);
            color: #f0f6fc;
        }

        /* Asynchronous Feedback States */
        .status {
            text-align: center;
            color: #8b949e;
            font-weight: 500;
            padding: 40px;
            background: #161b22;
            border-radius: 14px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Protocol Directory</h1>
        <ul id="file-list"><li class="status">Loading data engine components...</li></ul>
    </div>

    <script>
        const GITHUB_USER = 'peptide-info';
        const GITHUB_REPO = 'vials';
        const FOLDER_PATH = 'peptides'; 

        // Dynamic badge router logic using only Water and DNA helix elements
        function getBadgeIcon(filename) {
            const name = filename.toLowerCase();
            
            // If the item identifies as mixing solution/water elements
            if (name.includes('bac') || name.includes('water')) {
                return '💧';
            }
            
            // Default baseline fallback for all active items
            return '🧬'; 
        }

        async function loadFiles() {
            const listElement = document.getElementById('file-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`);
                if (!response.ok) throw new Error('Failed to reach GitHub database resources');
                
                const data = await response.json();
                let htmlString = '';

                const validFiles = data.filter(item => 
                    item.type === 'file' && 
                    item.name.endsWith('.html') && 
                    item.name !== 'index.html'
                );

                if (validFiles.length === 0) {
                    listElement.innerHTML = '<li class="status">No HTML protocols found in target workspace.</li>';
                    return;
                }

                validFiles.forEach(file => {
                    // Extract corresponding emoji badge value selection
                    const itemIcon = getBadgeIcon(file.name);

                    // Clean string adjustments out seamlessly
                    let rawName = file.name.replace('.html', '').replace(/-/g, ' ');
                    
                    let displayName = rawName.split(' ').map(word => {
                        let lowerWord = word.toLowerCase();

                        if (lowerWord === 'with') return 'w/';

                        // Normalize common structural metrics layouts
                        if (lowerWord.endsWith('mg')) {
                            return lowerWord.slice(0, -2) + 'mg';
                        }
                        if (lowerWord.endsWith('ml')) {
                            return lowerWord.slice(0, -2) + 'mL';
                        }

                        if (word.length <= 3) {
                            return word.toUpperCase();
                        } else {
                            return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                        }
                    }).join(' ');
                    
                    // Render fully block-wrapped structural content layouts
                    htmlString += `
                        <li>
                            <div class="card-inner">
                                <a href="${FOLDER_PATH}/${file.name}" class="protocol-link">
                                    <div class="link-content">
                                        <span class="badge-icon">${itemIcon}</span>
                                        <span>${displayName}</span>
                                    </div>
                                </a>
                            </div>
                        </li>`;
                });

                listElement.innerHTML = htmlString;
            } catch (error) {
                listElement.innerHTML = `<li class="status" style="color:#ff7b72; border-color: rgba(255,123,114,0.2);">Error: ${error.message}</li>`;
            }
        }

        loadFiles();
    </script>
</body>
</html>
