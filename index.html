<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Files</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 40px; background: #fafafa; }
        h1 { color: #222; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; background: #fff; margin-bottom: 8px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        a { color: #0969da; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>File Directory</h1>
    <ul id="file-list">Loading files...</ul>

    <script>
        // CHANGE THESE to your actual GitHub info
        const GITHUB_USER = 'peptide-info';
        const GITHUB_REPO = 'vials';

        async function loadFiles() {
            const listElement = document.getElementById('file-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error('Failed to fetch repository contents');
                
                const data = await response.json();
                let htmlString = '';

                // Filter out hidden files, folders, and index.html itself
                const validFiles = data.filter(item => 
                    item.type === 'file' && 
                    item.name !== 'index.html' && 
                    !item.name.startsWith('.')
                );

                if (validFiles.length === 0) {
                    listElement.innerHTML = '<li>No files found.</li>';
                    return;
                }

                validFiles.forEach(file => {
                    htmlString += `<li><a href="${file.path}">${file.name}</a></li>`;
                });

                listElement.innerHTML = htmlString;
            } catch (error) {
                listElement.innerHTML = `<li style="color:red;">Error loading files: ${error.message}</li>`;
            }
        }

        loadFiles();
    </script>
</body>
</html>
