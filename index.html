<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peptide Info — Protocol Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1c2a24;
            --muted: #5c6f66;
            --paper: #f3f6f2;
            --panel: rgba(255, 255, 255, 0.72);
            --line: rgba(28, 42, 36, 0.12);
            --accent: #0f7a5f;
            --accent-soft: #d8efe6;
            --glow: #c9e8a8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(1200px 600px at 10% -10%, var(--glow), transparent 55%),
                radial-gradient(900px 500px at 100% 0%, #b7ddd4, transparent 50%),
                linear-gradient(180deg, #eef5ef 0%, var(--paper) 45%, #e7efe9 100%);
        }

        .page {
            width: min(720px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0 72px;
        }

        .hero {
            margin-bottom: 36px;
            animation: rise 0.55s ease both;
        }

        .brand {
            font-family: "Fraunces", serif;
            font-size: clamp(2.4rem, 7vw, 3.4rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin: 0 0 10px;
        }

        .lede {
            margin: 0;
            max-width: 34rem;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.55;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .search {
            flex: 1;
            min-width: 220px;
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-radius: 999px;
            padding: 12px 16px;
            font: inherit;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search:focus {
            border-color: rgba(15, 122, 95, 0.45);
            box-shadow: 0 0 0 4px rgba(15, 122, 95, 0.12);
        }

        .count {
            align-self: center;
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 500;
            padding: 0 4px;
        }

        .group {
            margin-bottom: 28px;
            animation: rise 0.6s ease both;
        }

        .group:nth-child(2) { animation-delay: 0.05s; }
        .group:nth-child(3) { animation-delay: 0.1s; }
        .group:nth-child(4) { animation-delay: 0.15s; }
        .group:nth-child(5) { animation-delay: 0.2s; }
        .group:nth-child(6) { animation-delay: 0.25s; }

        .group-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin: 0 0 12px;
            padding: 0 4px;
        }

        .group-title {
            font-family: "Fraunces", serif;
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .group-note {
            margin: 0;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .protocol-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 8px;
        }

        .protocol-list a {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            grid-template-areas:
                "name tags"
                "meta tags";
            column-gap: 16px;
            row-gap: 4px;
            align-items: center;
            text-decoration: none;
            color: inherit;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .protocol-list a:hover,
        .protocol-list a:focus-visible {
            transform: translateY(-2px);
            border-color: rgba(15, 122, 95, 0.35);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 28px rgba(28, 42, 36, 0.08);
            outline: none;
        }

        .protocol-name {
            grid-area: name;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
        }

        .protocol-meta {
            grid-area: meta;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .tags {
            grid-area: tags;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-self: center;
        }

        .tag {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 5px 8px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            white-space: nowrap;
        }

        .tag.route-nasal { background: #e7eefc; color: #3557a0; }
        .tag.route-blend { background: #f4ebd6; color: #7a5a1e; }
        .tag.route-supply { background: #eceff3; color: #4d5b68; }

        .status,
        .empty {
            text-align: center;
            color: var(--muted);
            padding: 36px 20px;
            border: 1px dashed var(--line);
            border-radius: 14px;
            background: rgba(255,255,255,0.45);
        }

        .status.error { color: #a12828; border-color: rgba(161, 40, 40, 0.25); }

        .group[hidden],
        .protocol-list li[hidden] { display: none; }

        @keyframes rise {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            .page { padding-top: 32px; }
            .protocol-list a {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "name"
                    "meta"
                    "tags";
            }
            .tags { justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="hero">
            <h1 class="brand">Peptide Info</h1>
            <p class="lede">Protocol sheets with reconstitution math, dosing tables, and calculator defaults for each vial.</p>
            <div class="toolbar">
                <input class="search" id="protocol-search" type="search" placeholder="Search protocols…" aria-label="Search protocols">
                <span class="count" id="protocol-count"></span>
            </div>
        </header>

        <div id="directory">
            <p class="status">Loading protocols…</p>
        </div>
    </main>

    <script>
        const GITHUB_USER = 'peptide-info';
        const GITHUB_REPO = 'vials';
        const FOLDER_PATH = 'peptides';

        const GROUPS = [
            { id: 'metabolic', label: 'Metabolic & Body Comp', note: 'Weekly and daily body-composition protocols' },
            { id: 'gh', label: 'GH Secretagogues', note: 'Pulsatile GH support and nightly GHRH protocols' },
            { id: 'repair', label: 'Repair & Recovery', note: 'Tissue repair, skin, and recovery blends' },
            { id: 'nasal', label: 'Nasal & CNS', note: 'Intranasal and CNS-leaning compounds' },
            { id: 'supplies', label: 'Supplies', note: 'Diluent reference' },
            { id: 'other', label: 'Other', note: 'Uncategorized sheets' }
        ];

        // Display metadata + grouping. Unknown GitHub files still appear under Other.
        const CATALOG = {
            'retatrutide-10mg.html': { title: 'Retatrutide', meta: '10 mg vial · weekly Sub-Q', group: 'metabolic', tags: ['Sub-Q'] },
            'retatrutide-30mg.html': { title: 'Retatrutide', meta: '30 mg vial · weekly Sub-Q', group: 'metabolic', tags: ['Sub-Q'] },
            'tesamorelin-10mg.html': { title: 'Tesamorelin', meta: '10 mg vials · 3-week pen load', group: 'gh', tags: ['Sub-Q'] },
            'cjc-1295-no-dac-with-ipamorelin.html': { title: 'CJC-1295 No DAC + Ipamorelin', meta: '5 mg + 5 mg blend · 5 on / 2 off', group: 'gh', tags: ['Sub-Q', 'Blend'] },
            'bpc-157-5mg.html': { title: 'BPC-157', meta: '5 mg vial · daily Sub-Q', group: 'repair', tags: ['Sub-Q'] },
            'ghk-cu-100mg.html': { title: 'GHK-Cu', meta: '100 mg vial · daily Sub-Q', group: 'repair', tags: ['Sub-Q'] },
            'ghk-cu-100mg-with-bpc-157-10mg.html': { title: 'GHK-Cu + BPC-157', meta: 'Injectable blend + HA serum split', group: 'repair', tags: ['Blend', 'Topical'] },
            'selank-5mg.html': { title: 'Selank', meta: '5 mg · nasal spray protocol', group: 'nasal', tags: ['Nasal'] },
            'pt-141-10mg.html': { title: 'PT-141', meta: '10 mg · nasal default, Sub-Q option', group: 'nasal', tags: ['Nasal', 'Sub-Q'] },
            'bac-water-3ml.html': { title: 'Bacteriostatic Water', meta: '3 mL diluent reference', group: 'supplies', tags: ['Supply'] }
        };

        function tagClass(tag) {
            const t = tag.toLowerCase();
            if (t === 'nasal') return 'tag route-nasal';
            if (t === 'blend' || t === 'topical') return 'tag route-blend';
            if (t === 'supply') return 'tag route-supply';
            return 'tag';
        }

        function fallbackTitle(filename) {
            return filename.replace('.html', '').replace(/-/g, ' ')
                .split(' ')
                .map((word) => {
                    const lower = word.toLowerCase();
                    if (lower === 'with') return 'w/';
                    if (lower.endsWith('mg')) return lower.slice(0, -2) + 'mg';
                    if (lower.endsWith('ml')) return lower.slice(0, -2) + 'mL';
                    if (word.length <= 3) return word.toUpperCase();
                    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                })
                .join(' ');
        }

        function renderDirectory(files) {
            const root = document.getElementById('directory');
            const grouped = Object.fromEntries(GROUPS.map((g) => [g.id, []]));

            files.forEach((file) => {
                const info = CATALOG[file.name] || {
                    title: fallbackTitle(file.name),
                    meta: 'Protocol sheet',
                    group: 'other',
                    tags: []
                };
                grouped[info.group]?.push({ file, info });
            });

            let html = '';
            let total = 0;

            GROUPS.forEach((group) => {
                const items = grouped[group.id] || [];
                if (!items.length) return;
                total += items.length;

                items.sort((a, b) => a.info.title.localeCompare(b.info.title) || a.file.name.localeCompare(b.file.name));

                html += `
                    <section class="group" data-group="${group.id}">
                        <div class="group-head">
                            <h2 class="group-title">${group.label}</h2>
                            <p class="group-note">${group.note}</p>
                        </div>
                        <ul class="protocol-list">
                            ${items.map(({ file, info }) => `
                                <li data-search="${(info.title + ' ' + info.meta + ' ' + info.tags.join(' ') + ' ' + file.name).toLowerCase()}">
                                    <a href="${FOLDER_PATH}/${file.name}">
                                        <span class="protocol-name">${info.title}</span>
                                        <span class="protocol-meta">${info.meta}</span>
                                        <span class="tags">
                                            ${info.tags.map((tag) => `<span class="${tagClass(tag)}">${tag}</span>`).join('')}
                                        </span>
                                    </a>
                                </li>
                            `).join('')}
                        </ul>
                    </section>
                `;
            });

            root.innerHTML = html || '<p class="empty">No protocol sheets found.</p>';
            document.getElementById('protocol-count').textContent = `${total} protocol${total === 1 ? '' : 's'}`;
        }

        function bindSearch() {
            const input = document.getElementById('protocol-search');
            input.addEventListener('input', () => {
                const q = input.value.trim().toLowerCase();
                let visible = 0;

                document.querySelectorAll('.group').forEach((group) => {
                    let groupVisible = 0;
                    group.querySelectorAll('.protocol-list li').forEach((item) => {
                        const show = !q || item.dataset.search.includes(q);
                        item.hidden = !show;
                        if (show) groupVisible += 1;
                    });
                    group.hidden = groupVisible === 0;
                    visible += groupVisible;
                });

                document.getElementById('protocol-count').textContent = q
                    ? `${visible} match${visible === 1 ? '' : 'es'}`
                    : `${visible} protocol${visible === 1 ? '' : 's'}`;
            });
        }

        async function loadFiles() {
            const root = document.getElementById('directory');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`);
                if (!response.ok) throw new Error('Could not load protocol list from GitHub');

                const data = await response.json();
                const validFiles = data.filter((item) =>
                    item.type === 'file' &&
                    item.name.endsWith('.html') &&
                    item.name !== 'index.html'
                );

                renderDirectory(validFiles);
                bindSearch();
            } catch (error) {
                // Offline / local fallback: render catalog entries directly
                const fallbackFiles = Object.keys(CATALOG).map((name) => ({ name }));
                if (fallbackFiles.length) {
                    renderDirectory(fallbackFiles);
                    bindSearch();
                    return;
                }
                root.innerHTML = `<p class="status error">Error: ${error.message}</p>`;
            }
        }

        loadFiles();
    </script>
</body>
</html>
